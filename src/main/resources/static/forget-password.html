<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Cluvr - 비밀번호 찾기</title>
  <link rel="stylesheet" href="css/main.css">
  <meta name="viewport" content="width=375, initial-scale=1, maximum-scale=1">
  <style>
    .forget-card { background:#F0FFF4; border-radius:16px; box-shadow:0 1px 4px #0001; padding:32px 24px 24px 24px; width:100%; max-width:340px; margin:40px auto 0 auto; display:flex; flex-direction:column; align-items:center; }
    .forget-title { font-size:2rem; font-weight:bold; color:#6EE7B7; margin-bottom:24px; }
    .forget-input { width:100%; margin-bottom:12px; border-radius:6px; border:1px solid #e5e5e5; padding:10px; font-size:1rem; }
    .forget-btn { width:100%; background:#6EE7B7; color:#fff; border:none; border-radius:8px; font-size:1.1rem; padding:12px 0; font-weight:bold; margin-bottom:8px; }
    .forget-link { color:#6EE7B7; text-decoration:none; font-size:1rem; margin:0 8px; }
  </style>
</head>
<body>
  <main class="main-content" style="display:flex; flex-direction:column; align-items:center;">
    <form class="forget-card" id="forgetForm">
      <div class="forget-title">Forget Password</div>
      <input name="email" type="email" class="forget-input" placeholder="Email" required>
      <button type="submit" class="forget-btn">Send Reset Link</button>
      <div style="margin-top:8px;">
        <a href="login.html" class="forget-link">Back to Login</a>
      </div>
    </form>
  </main>
  <script>
    document.getElementById('forgetForm').onsubmit = function(e) {
      e.preventDefault();
      // 실제 비밀번호 재설정 로직은 API 연동 필요
      alert('비밀번호 재설정 링크가 전송되었습니다!');
      location.href = 'login.html';
    }
  </script>
</body>
</html>
