<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>로그인</title>
</head>
<body>
<h1>JWT 로그인 예제</h1>

<!-- 로그인 완료 메시지 -->
<div id="loginSuccess" style="display: none;">
  <p>✅ 로그인 완료!</p>
</div>

<!-- 로그인 폼 -->
<form id="loginForm" style="display: none;">
  <label for="email">이메일:</label>
  <input type="email" id="email" required /><br />

  <label for="password">비밀번호:</label>
  <input type="password" id="password" required /><br />

  <button type="submit">로그인</button>
</form>
<button id="checkout-btn">결제하기</button>
<script>
  const token = localStorage.getItem("accessToken");
  const loginForm = document.getElementById("loginForm");
  const loginSuccess = document.getElementById("loginSuccess");

  // 이미 로그인 되어 있으면 메시지 표시
  if (token) {
    loginSuccess.style.display = "block";
  } else {
    loginForm.style.display = "block";
  }

  loginForm.addEventListener("submit", async function (event) {
    event.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const response = await fetch("http://localhost:8080/api/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      if (!response.ok) {
        const error = await response.json();
        alert("❌ 로그인 실패: " + (error.message || "서버 오류"));
        return;
      }

      const result = await response.json();
      const accessToken = result.data.accessToken;

      // 토큰 저장하고 로그인 성공 처리
      localStorage.setItem("accessToken", accessToken);
      loginForm.style.display = "none";
      loginSuccess.style.display = "block";
    } catch (err) {
      console.error("에러 발생:", err);
      alert("⚠️ 네트워크 오류 또는 서버 문제");
    }
  });
</script>

<script>
  document.getElementById('checkout-btn').addEventListener('click', async () => {
    try {
      const response = await fetch('/api/checkout', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          amount:2000,
          orderName:"포인트 충전"
        })
      });

      if (!response.ok) throw new Error('요청 실패');

      const data = await response.json();
      const query = new URLSearchParams({
        amount: data.amount,
        orderName: data.orderName,
        orderId: data.orderId
      });

      window.location.href = "/payment/checkout?" + query.toString();

    } catch (err) {
      console.error('결제 준비 중 오류:', err);
      alert('결제 준비에 실패했습니다.');
    }
  });
</script>

</body>
</html>
