<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="stylesheet" href="css/style.css">
  <meta charset="UTF-8" />
  <title>로그인</title>
</head>
<body>
<h1>JWT 로그인 예제</h1>

<!-- 로그인 완료 메시지 -->
<div id="loginSuccess" style="display: none;">
  <p>✅ 로그인 완료!</p>
  <label for="amount">충전 가격:</label>
  <input type="amount" id="amount" required /><br />
</div>

<!-- 로그인 폼 -->
<form id="loginForm" style="display: none;">
  <label for="email">이메일:</label>
  <input type="email" id="email" required /><br />

  <label for="password">비밀번호:</label>
  <input type="password" id="password" required /><br />

  <button type="submit">로그인</button>
</form>

<!-- 결제 페이지 이동 -->
<button id="checkout-btn">결제하기</button>

<script>
  const token = localStorage.getItem("accessToken");
  const loginForm = document.getElementById("loginForm");
  const loginSuccess = document.getElementById("loginSuccess");

  if (token) {
    loginSuccess.style.display = "block";
  } else {
    loginForm.style.display = "block";
  }

  loginForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const response = await fetch("http://localhost/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      if (!response.ok) {
        const error = await response.json();
        alert("❌ 로그인 실패: " + (error.message || "서버 오류"));
        return;
      }

      const result = await response.json();
      const accessToken = result.data.accessToken;
      alert(accessToken);
      localStorage.setItem("accessToken", accessToken);

      loginForm.style.display = "none";
      loginSuccess.style.display = "block";
    } catch (err) {
      alert("⚠️ 네트워크 오류 또는 서버 문제");
    }
  });

  document.getElementById('checkout-btn').addEventListener('click', () => {
    const token = localStorage.getItem("accessToken");
    const amount = document.getElementById("amount").value;
    if (!token) {
      alert("로그인이 필요합니다.");
      return;
    }
    const query = new URLSearchParams({ amount });
    window.location.href = "/payment/checkout.html?" + query.toString();
  });
</script>
</body>
</html>
