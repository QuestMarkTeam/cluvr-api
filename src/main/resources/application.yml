server:
  error:
    include-message: always
  port: 8082

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.us-west-2.amazonaws.com/${USER_POOL_ID}
          jwk-set-uri: https://cognito-idp.us-west-2.amazonaws.com/${USER_POOL_ID}/.well-known/jwks.json
      client:
        registration:
          cognito:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            client-name: cluvr-user-pool
            provider: cognito
            authorization-grant-type: authorization_code
            redirect-uri: ${COGNITO_REDIRECT_URI}
            scope:
              - openid
              - email
              - profile
        provider:
          cognito:
            issuer-uri: https://cognito-idp.us-west-2.amazonaws.com/${USER_POOL_ID}
            user-name-attribute: sub

  application:
    name: cluvr
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
#      ssl:
#        enabled: true
  batch:
    job:
      enabled: false  # 앱 실행 시 자동 실행 방지 (직접 JobLauncher 사용하기 위함)
    jdbc:
      initialize-schema: never

  rabbitmq:
    host: ${RMQ_HOST}
    port: ${RMQ_PORT}
    username: ${RMQ_USERNAME}
    password: ${RMQ_PASSWORD}

  datasource:
#    username: ${DB_USERNAME}
#    password: ${DB_PASSWORD}
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/test1234?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect
        highlight_sql: true
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        debug: true
jwt:
  secret:
    key: ${jwt.secret.key}
app:
  cors:
    allowed-origins:
      - http://localhost:*
      - http://127.0.0.1:*
      - http://localhost:63342
      - http://localhost:3000
      - http://54.200.146.243
      - https://cluvr.co.kr


cognito:
  userPoolId: ${USER_POOL_ID}
  clientId: ${CLIENT_ID}
  jwkSetUri: https://cognito-idp.us-west-2.amazonaws.com/${USER_POOL_ID}/.well-known/jwks.json
  clientSecret: ${CLIENT_SECRET}

cloud:
  aws:
    region:
      static: us-west-2
    credentials:
      access-key: ${ACCESS_AWS}
      secret-key: ${SECRET_AWS}
    s3:
      bucket: cluvr-image
logging:
  level:
    root: INFO
    software.amazon.awssdk: DEBUG
    software.amazon.awssdk.auth: DEBUG
    com.amazonaws: DEBUG
    com.example.cluvrapi: DEBUG
