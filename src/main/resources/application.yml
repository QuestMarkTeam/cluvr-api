server:
  error:
    include-message: always
  port: 80

logging:
  level:
    root: INFO
    io.lettuce.core: DEBUG
    software.amazon.awssdk: DEBUG
    software.amazon.awssdk.auth: DEBUG
    com.amazonaws: DEBUG
    com.example.cluvrapi: DEBUG
    org.springframework.data.redis: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO


spring:
  application:
    name: cluvr

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.us-west-2.amazonaws.com/us-west-2_Nt2iRhUaQ
          jwk-set-uri: https://cognito-idp.us-west-2.amazonaws.com/us-west-2_Nt2iRhUaQ/.well-known/jwks.json

      client:
        registration:
          cognito:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            client-name: cluvr-user-pool
            provider: cognito
            authorization-grant-type: authorization_code
            redirect-uri: ${COGNITO_REDIRECT_URI}
            scope:
              - openid
              - email
              - profile
        provider:
          cognito:
            issuer-uri: https://cognito-idp.us-west-2.amazonaws.com/${USER_POOL_ID}
            user-name-attribute: sub

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      ssl:
        enabled: true
      timeout: 10

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  datasource:
      username: yong311
      password: yong311
  #    username: ${DB_USERNAME}
  #    password: ${DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
  #    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      url: jdbc:mysql://localhost:3306/query?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect
        highlight_sql: true

  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        debug: true
jwt:
  secret:
    key: ${jwt.secret.key}
app:
  cors:
    allowed-origins:
      - http://localhost:*
      - http://127.0.0.1:*
      - http://localhost:63342
      - http://localhost:3000
      - http://54.200.146.243


cognito:
  userPoolId: ${USER_POOL_ID}
  clientId: ${CLIENT_ID}
  jwkSetUri: https://cognito-idp.us-west-2.amazonaws.com/${USER_POOL_ID}/.well-known/jwks.json
  clientSecret: ${CLIENT_SECRET}
  redirect-uri: https://d84l1y8p4kdic.cloudfront.net
  token-endpoint: https://us-west-2nt2irhuaq.auth.us-west-2.amazoncognito.com/oauth2/token

cloud:
  aws:
    region:
      static: us-west-2
    credentials:
      access-key: ${ACCESS_AWS}
      secret-key: ${SECRET_AWS}

